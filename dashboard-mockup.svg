<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F0E8"/>
      <stop offset="1" stop-color="#E7EFE8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFDF9"/>
      <stop offset="1" stop-color="#F7F5EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#31473A" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 34px Georgia, serif; fill: #1F3529; }
      .subtitle { font: 400 16px Verdana, sans-serif; fill: #496252; }
      .nav { font: 600 15px Verdana, sans-serif; fill: #264434; }
      .cardTitle { font: 600 14px Verdana, sans-serif; fill: #5F7668; letter-spacing: 0.08em; }
      .cardValue { font: 700 30px Georgia, serif; fill: #1C3327; }
      .small { font: 400 13px Verdana, sans-serif; fill: #5F7668; }
      .tableHead { font: 700 12px Verdana, sans-serif; fill: #6D8176; letter-spacing: 0.08em; }
      .tableCell { font: 600 14px Verdana, sans-serif; fill: #243D31; }
      .green { fill: #157347; }
      .red { fill: #B54737; }
      .muted { fill: #7A8E82; }
      .chip { font: 700 12px Verdana, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1350" cy="140" r="180" fill="#D9E7D8"/>
  <circle cx="180" cy="860" r="220" fill="#E9DED0"/>

  <rect x="70" y="48" width="1460" height="900" rx="32" fill="url(#panel)" filter="url(#shadow)"/>

